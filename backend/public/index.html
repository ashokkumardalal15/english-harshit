<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolo English - Tara Didi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito', sans-serif;
    background: #FFF8EC;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 12px 40px;
  }
  .wrap { width: 100%; max-width: 480px; }
  header { text-align: center; margin-bottom: 14px; }
  .brand-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #4A3728;
    margin: 0;
  }
  .subtitle { color: #8A6F5C; font-weight: 600; margin-top: 4px; font-size: 14px; }

  .provider-row {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap;
  }
  .provider-btn {
    border: 2px solid #E6D8C3; background: #fff; color: #4A3728;
    font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 20px;
    cursor: pointer; font-family: 'Nunito', sans-serif;
  }
  .provider-btn.active { background: #7FD8BE; border-color: #7FD8BE; color: #fff; }
  .provider-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .mascot-row { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
  .mascot-circle {
    width: 74px; height: 74px; border-radius: 50%; background: #FFC857;
    border: 4px solid #fff; display: flex; align-items: center; justify-content: center;
    font-size: 38px; box-shadow: 0 6px 14px rgba(74,55,40,0.18);
  }
  .mascot-circle.talking { animation: talkPulse 0.5s ease-in-out infinite; }
  @keyframes talkPulse {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.08) rotate(-2deg); }
  }
  .teacher-name { margin-top: 6px; font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 13px; color: #8A6F5C; }

  .chat-box {
    background: #fff; border-radius: 20px; padding: 16px;
    box-shadow: 0 8px 24px rgba(74,55,40,0.08);
    height: 360px; overflow-y: auto; margin-bottom: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; }
  .bubble.tara {
    align-self: flex-start; background: #F0FBF7; border: 2px solid #7FD8BE;
    color: #2E4A3F; border-bottom-left-radius: 4px;
  }
  .bubble.child {
    align-self: flex-end; background: #FFF3E0; border: 2px solid #FFC857;
    color: #4A3728; border-bottom-right-radius: 4px;
  }
  .bubble.error { align-self: center; background: #FFF3F0; border: 2px solid #FF6B6B; color: #E85555; font-size: 13px; }

  .input-card { background: #fff; border-radius: 20px; padding: 16px; box-shadow: 0 8px 24px rgba(74,55,40,0.08); }
  .mic-row { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 12px; }
  .mic-btn {
    width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; background: #7FD8BE;
  }
  .mic-btn.listening { background: #FF6B6B; animation: pulseRing 1.4s infinite; }
  @keyframes pulseRing {
    0% { box-shadow: 0 0 0 0 rgba(255,107,107,0.55); }
    70% { box-shadow: 0 0 0 22px rgba(255,107,107,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
  }
  .mic-label { font-size: 13px; color: #8A6F5C; font-weight: 600; text-align: center; }
  .mic-error { font-size: 12.5px; color: #E85555; font-weight: 700; text-align: center; }

  textarea {
    width: 100%; border-radius: 12px; border: 2px solid #F1E6D6; padding: 10px;
    font-family: 'Nunito', sans-serif; font-size: 15px; resize: none; margin-bottom: 10px;
  }
  .send-btn {
    width: 100%; background: #FF6B6B; color: #fff; border: none; border-radius: 14px;
    padding: 12px 0; font-weight: 800; font-size: 15px; font-family: 'Baloo 2', sans-serif;
    cursor: pointer;
  }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand-row">
      <span style="font-size:22px;">🍽️</span>
      <h1>Bolo English!</h1>
    </div>
    <p class="subtitle">Tara Didi ke saath English mein baat karo</p>
  </header>

  <div class="provider-row" id="providerRow">
    <button class="provider-btn" data-provider="gemini">Gemini</button>
    <button class="provider-btn" data-provider="claude">Claude</button>
    <button class="provider-btn" data-provider="openai">ChatGPT</button>
  </div>

  <div class="mascot-row">
    <div class="mascot-circle" id="mascot">👧🏻</div>
    <span class="teacher-name">Tara Didi</span>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-card">
    <div class="mic-row">
      <button class="mic-btn" id="micBtn">🎤</button>
      <p class="mic-label" id="micLabel">Mic dabao aur English mein bolo</p>
      <p class="mic-error" id="micError"></p>
    </div>
    <textarea id="textInput" rows="2" placeholder="Ya yahan type karo..."></textarea>
    <button class="send-btn" id="sendBtn">Bhejo</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const providerRow = document.getElementById('providerRow');
  const mascot = document.getElementById('mascot');
  const micBtn = document.getElementById('micBtn');
  const micLabel = document.getElementById('micLabel');
  const micError = document.getElementById('micError');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');

  let provider = 'gemini';
  let history = []; // [{role: 'user'|'assistant', content: '...'}]
  let listening = false;
  let sending = false;

  // ---- Provider selector ----
  function setProvider(p) {
    provider = p;
    [...providerRow.children].forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.provider === p);
    });
  }
  providerRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.provider-btn');
    if (btn && !btn.disabled) setProvider(btn.dataset.provider);
  });

  fetch('/api/providers').then(r => r.json()).then((cfg) => {
    [...providerRow.children].forEach((btn) => {
      if (!cfg[btn.dataset.provider]) {
        btn.disabled = true;
        btn.title = 'Server par is provider ki API key set nahi hai';
      }
    });
    // Default to the first configured provider
    const firstAvailable = ['gemini', 'claude', 'openai'].find((p) => cfg[p]);
    if (firstAvailable) setProvider(firstAvailable);
  }).catch(() => {});
  setProvider('gemini');

  // ---- Chat rendering ----
  function addBubble(text, who) {
    const div = document.createElement('div');
    div.className = 'bubble ' + who;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.95;
    utter.pitch = 1.15;
    const voices = window.speechSynthesis.getVoices();
    const voice = voices.find(v => /female|samantha|zira|tara|veena|karen|moira/i.test(v.name) && v.lang.startsWith('en'))
      || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (voice) utter.voice = voice;
    utter.onstart = () => mascot.classList.add('talking');
    utter.onend = () => mascot.classList.remove('talking');
    utter.onerror = () => mascot.classList.remove('talking');
    window.speechSynthesis.speak(utter);
  }

  async function sendMessage(text) {
    if (!text.trim() || sending) return;
    sending = true;
    sendBtn.disabled = true;
    addBubble(text, 'child');
    history.push({ role: 'user', content: text });
    textInput.value = '';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider, history: history.slice(0, -1), message: text }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      addBubble(data.reply, 'tara');
      history.push({ role: 'assistant', content: data.reply });
      speak(data.reply);
    } catch (err) {
      addBubble('Kuch gadbad ho gayi: ' + err.message, 'error');
    } finally {
      sending = false;
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(textInput.value));
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(textInput.value);
    }
  });

  // ---- Speech recognition (mic) ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  if (SR) {
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.onresult = (event) => {
      let text = '';
      for (let i = 0; i < event.results.length; i++) text += event.results[i][0].transcript;
      textInput.value = text;
      if (event.results[event.results.length - 1].isFinal) {
        listening = false;
        micBtn.classList.remove('listening');
        micLabel.textContent = 'Mic dabao aur English mein bolo';
      }
    };
    recognition.onerror = (event) => {
      listening = false;
      micBtn.classList.remove('listening');
      const messages = {
        'not-allowed': 'Mic ki permission block hai. Browser settings mein allow karo.',
        'no-speech': 'Kuch sunayi nahi diya, phir se bolo.',
        'audio-capture': 'Mic mil nahi raha.',
        'network': 'Internet check karo.',
      };
      micError.textContent = messages[event.error] || 'Mic mein dikkat, type karke try karo.';
    };
    recognition.onend = () => {
      listening = false;
      micBtn.classList.remove('listening');
    };
  } else {
    micLabel.textContent = 'Voice support nahi hai, neeche type karo.';
    micBtn.disabled = true;
  }

  micBtn.addEventListener('click', async () => {
    if (!recognition) return;
    micError.textContent = '';
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach((t) => t.stop());
      } catch (e) {
        micError.textContent = 'Mic permission nahi mili.';
        return;
      }
    }
    listening = true;
    micBtn.classList.add('listening');
    micLabel.textContent = 'Sun rahe hain... bolo!';
    textInput.value = '';
    try { recognition.start(); } catch (e) { /* already started */ }
  });

  // Opening message from Tara Didi
  window.addEventListener('load', () => {
    const greeting = "Hi! I'm Tara Didi. What did you eat for breakfast today?";
    addBubble(greeting, 'tara');
    history.push({ role: 'assistant', content: greeting });
    setTimeout(() => speak(greeting), 400);
  });
</script>
</body>
</html>
